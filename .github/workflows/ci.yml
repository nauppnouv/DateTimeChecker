name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Run JUnit Unit Tests
        run: mvn clean test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Start Spring Boot Application in Background
        run: |
          mvn spring-boot:run &
          echo "Waiting for Spring Boot to start..."
          # Poll the check endpoint until it's up, max 60 seconds
          for i in {1..60}; do
            if curl -s -f http://localhost:8081 > /dev/null; then
              echo "Spring Boot app is ready!"
              break
            fi
            sleep 1
          done

      - name: Run API Tests
        run: npm run test:api

      - name: Run E2E Tests
        run: npm run test:e2e

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
