appId: com.fu.swt.datetimechecker
---
- launchApp
- extendedWaitUntil:
    visible: "Date Time Checker"
    timeout: 20000
- tapOn:
    id: "day-input"
- inputText: "25"
- tapOn:
    id: "month-input"
- inputText: "5"
- tapOn:
    id: "year-input"
- inputText: "2026"
- tapOn:
    id: "check-button"
- assertVisible: "25/5/2026 is correct date time!"
- tapOn:
    id: "clear-button"
- assertNotVisible: "25/5/2026 is correct date time!"
- tapOn:
    id: "day-input"
- inputText: "31"
- tapOn:
    id: "month-input"
- inputText: "11"
- tapOn:
    id: "year-input"
- inputText: "2026"
- tapOn:
    id: "check-button"
- assertVisible: "31/11/2026 is NOT correct date time!"
- tapOn:
    id: "clear-button"
- tapOn:
    id: "day-input"
- inputText: "29"
- tapOn:
    id: "month-input"
- inputText: "2"
- tapOn:
    id: "year-input"
- inputText: "2024"
- tapOn:
    id: "check-button"
- assertVisible: "29/2/2024 is correct date time!"
- tapOn:
    id: "clear-button"
- tapOn:
    id: "day-input"
- inputText: "29"
- tapOn:
    id: "month-input"
- inputText: "2"
- tapOn:
    id: "year-input"
- inputText: "2025"
- tapOn:
    id: "check-button"
- assertVisible: "29/2/2025 is NOT correct date time!"
- tapOn:
    id: "clear-button"
- tapOn:
    id: "day-input"
- inputText: "abc"
- tapOn:
    id: "month-input"
- inputText: "12"
- tapOn:
    id: "year-input"
- inputText: "2020"
- tapOn:
    id: "check-button"
- assertVisible: "Input data for Day is incorrect format!"
- tapOn:
    id: "clear-button"
- tapOn:
    id: "day-input"
- inputText: "32"
- tapOn:
    id: "month-input"
- inputText: "10"
- tapOn:
    id: "year-input"
- inputText: "2020"
- tapOn:
    id: "check-button"
- assertVisible: "Input data for Day is out of range!"
- tapOn:
    id: "clear-button"
- tapOn:
    id: "day-input"
- inputText: "15"
- tapOn:
    id: "month-input"
- inputText: "13"
- tapOn:
    id: "year-input"
- inputText: "2020"
- tapOn:
    id: "check-button"
- assertVisible: "Input data for Month is out of range!"
- tapOn:
    id: "clear-button"
- tapOn:
    id: "day-input"
- inputText: "15"
- tapOn:
    id: "month-input"
- inputText: "08"
- tapOn:
    id: "year-input"
- inputText: "999"
- tapOn:
    id: "check-button"
- assertVisible: "Input data for Year is out of range!"
- tapOn:
    id: "close-button"
- assertVisible: "Are you sure you want to exit?"
- tapOn:
    id: "confirm-no"
- assertNotVisible: "Are you sure you want to exit?"
